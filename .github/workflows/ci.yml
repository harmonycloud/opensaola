name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Bumped from v1.63.4 (built with Go 1.23) because go.mod targets Go 1.26.1 and the old
      # binary fails with: "the Go language version (go1.23) used to build golangci-lint is lower
      # than the targeted Go version (1.26.1)".
      #
      # FOLLOW-UPS (cannot be done in this job-only change):
      #   1. .golangci.yml is v1-schema; golangci-lint v2 requires `version: "2"`. Migrate the
      #      config file in a separate PR (see https://golangci-lint.run/docs/product/migration-guide).
      #   2. No released golangci-lint binary is currently built with Go 1.26+ (v2.11.4 latest is
      #      built with go1.25). Until upstream ships a go1.26-built release, this step may still
      #      fail the same way on Go 1.26.1 targets. Options: lower go.mod to go 1.25.x, or build
      #      golangci-lint from source in CI with the repo's Go toolchain.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: make test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=cover.out 2>/dev/null | grep total: | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < 25" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
            echo "FAIL: Coverage ${COVERAGE}% is below 25% threshold"
            exit 1
          fi

  test-race:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests with race detector
        run: make test-race

  envtest:
    name: Controller Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Setup envtest binaries
        run: make setup-envtest
      - name: Run controller envtest
        run: make test-envtest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: make build

  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Kind
        run: |
          [ -f /usr/local/bin/kind ] || {
            curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
            chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          }
      - name: Run E2E smoke
        run: make test-e2e-smoke
        timeout-minutes: 15

  verify:
    name: Verify Generated Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check manifests and generated code
        run: |
          make manifests generate
          git diff --exit-code || (echo "Generated code is out of date. Run 'make manifests generate' and commit." && exit 1)

  license:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check license headers
        run: |
          go install github.com/google/addlicense@latest
          addlicense -check -f hack/boilerplate.go.txt $(find cmd internal api pkg -name '*.go' ! -name 'zz_generated*')
