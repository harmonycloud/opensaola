name: Docker

on:
  push:
    tags: ['v*']
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'chart/**'
  workflow_dispatch:

permissions:
  contents: read

# A stale dev lock is updated and explicitly re-dispatched before publishing.
# Serializing by ref prevents two dev runs from racing that lock update.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  manager-metadata:
    name: Resolve manager metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      git_commit: ${{ steps.metadata.outputs.git_commit }}
      build_date: ${{ steps.metadata.outputs.build_date }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Derive and validate manager metadata
        id: metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          commit="$(git rev-parse HEAD)"
          [[ "${commit}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "checked-out manager commit is not a full lowercase SHA: ${commit}" >&2
            exit 1
          }
          [[ "${GITHUB_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "GitHub event SHA is not a full lowercase SHA: ${GITHUB_SHA}" >&2
            exit 1
          }
          [[ "${commit}" == "${GITHUB_SHA}" ]] || {
            echo "checked-out manager commit ${commit} does not match event SHA ${GITHUB_SHA}" >&2
            exit 1
          }

          build_date="$(git show -s --format=%cI "${commit}")"
          [[ "${build_date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(Z|[+-][0-9]{2}:[0-9]{2})$ ]] || {
            echo "manager commit date is not RFC3339: ${build_date}" >&2
            exit 1
          }

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              [[ "${PR_NUMBER}" =~ ^[1-9][0-9]*$ ]] || {
                echo "pull request number is invalid: ${PR_NUMBER}" >&2
                exit 1
              }
              version="pr-${PR_NUMBER}"
              ;;
            push|workflow_dispatch)
              case "${GITHUB_REF}" in
                refs/tags/*)
                  [[ "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]] || {
                    echo 'Release tags must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease' >&2
                    exit 1
                  }
                  version="${GITHUB_REF_NAME}"
                  ;;
                refs/heads/*)
                  version="${GITHUB_REF_NAME}"
                  ;;
                *)
                  echo "unsupported manager metadata ref: ${GITHUB_REF}" >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "unsupported manager metadata event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          for value in "${version}" "${commit}" "${build_date}"; do
            [[ -n "${value}" ]] || {
              echo 'manager metadata values must not be empty' >&2
              exit 1
            }
          done

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "git_commit=${commit}" >>"${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >>"${GITHUB_OUTPUT}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify manager version contract
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          GIT_COMMIT: ${{ steps.metadata.outputs.git_commit }}
          BUILD_DATE: ${{ steps.metadata.outputs.build_date }}
        run: |
          set -euo pipefail
          bash hack/manager-version-build_test.sh
          bash hack/manager-version-workflow_test.sh
          bash hack/manager-version_test.sh

  pr-build:
    if: github.event_name == 'pull_request'
    name: Build without publishing
    needs: manager-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Select the committed stable Saola CLI lock
        id: lock
        run: |
          set -euo pipefail
          if [[ -f build/saola-cli-stable.lock ]]; then
            echo 'path=build/saola-cli-stable.lock' >>"${GITHUB_OUTPUT}"
            echo 'enabled=true' >>"${GITHUB_OUTPUT}"
          else
            echo 'enabled=false' >>"${GITHUB_OUTPUT}"
            echo 'No final Saola CLI release exists yet; bootstrap PR is intentionally not building an official image.'
          fi
      - name: Export committed Saola CLI metadata
        if: steps.lock.outputs.enabled == 'true'
        id: cli
        env:
          LOCK_PATH: ${{ steps.lock.outputs.path }}
        run: |
          set -euo pipefail
          hack/saola-cli-lock.sh validate "${LOCK_PATH}"
          for key in repository version commit channel source_date_epoch; do
            value="$(hack/saola-cli-lock.sh get "${LOCK_PATH}" "${key}")"
            echo "${key}=${value}" >>"${GITHUB_OUTPUT}"
          done
      - name: Check out committed Saola CLI source
        if: steps.lock.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: harmonycloud/saola-cli
          ref: ${{ steps.cli.outputs.commit }}
          path: .saola-cli-source
          persist-credentials: false
      - if: steps.lock.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - if: steps.lock.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Normalize image name
        if: steps.lock.outputs.enabled == 'true'
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"
      - name: Docker meta
        if: steps.lock.outputs.enabled == 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.version=${{ needs.manager-metadata.outputs.version }}
            org.opencontainers.image.revision=${{ needs.manager-metadata.outputs.git_commit }}
            org.opencontainers.image.created=${{ needs.manager-metadata.outputs.build_date }}
            org.opensaola.saola-cli.repository=${{ steps.cli.outputs.repository }}
            org.opensaola.saola-cli.version=${{ steps.cli.outputs.version }}
            org.opensaola.saola-cli.revision=${{ steps.cli.outputs.commit }}
            org.opensaola.saola-cli.channel=${{ steps.cli.outputs.channel }}
      - name: Build without publishing
        if: steps.lock.outputs.enabled == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          build-contexts: |
            saola-cli=./.saola-cli-source
          build-args: |
            VERSION=${{ needs.manager-metadata.outputs.version }}
            GIT_COMMIT=${{ needs.manager-metadata.outputs.git_commit }}
            BUILD_DATE=${{ needs.manager-metadata.outputs.build_date }}
            SAOLA_CLI_VERSION=${{ steps.cli.outputs.version }}
            SAOLA_CLI_COMMIT=${{ steps.cli.outputs.commit }}
            SAOLA_CLI_SOURCE_DATE_EPOCH=${{ steps.cli.outputs.source_date_epoch }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  resolve-cli:
    if: github.event_name != 'pull_request'
    name: Resolve Saola CLI release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repository: ${{ steps.cli.outputs.repository }}
      version: ${{ steps.cli.outputs.version }}
      commit: ${{ steps.cli.outputs.commit }}
      channel: ${{ steps.cli.outputs.channel }}
      source_date_epoch: ${{ steps.cli.outputs.source_date_epoch }}
      lock_changed: ${{ steps.cli.outputs.lock_changed }}
      build_enabled: ${{ steps.cli.outputs.build_enabled }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Resolve and validate the immutable Saola CLI source
        id: cli
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          resolved_lock="${RUNNER_TEMP}/saola-cli.lock"
          lock_changed=false
          build_enabled=true

          case "${GITHUB_REF}" in
            refs/heads/dev|refs/heads/master)
              hack/resolve-saola-cli-release.sh resolve-latest "${resolved_lock}"
              if [[ -f build/saola-cli-stable.lock ]] && cmp -s "${resolved_lock}" build/saola-cli-stable.lock; then
                :
              elif [[ "${GITHUB_REF}" == refs/heads/master ]]; then
                echo 'master requires build/saola-cli-stable.lock to match the latest final Saola CLI release' >&2
                exit 1
              else
                lock_changed=true
                build_enabled=false
              fi
              ;;
            refs/tags/v*)
              cp build/saola-cli-stable.lock "${resolved_lock}"
              hack/resolve-saola-cli-release.sh verify-lock "${resolved_lock}"
              ;;
            *)
              echo "unsupported Docker workflow ref: ${GITHUB_REF}" >&2
              exit 1
              ;;
          esac

          hack/saola-cli-lock.sh validate "${resolved_lock}"
          for key in repository version commit channel source_date_epoch; do
            value="$(hack/saola-cli-lock.sh get "${resolved_lock}" "${key}")"
            echo "${key}=${value}" >>"${GITHUB_OUTPUT}"
          done
          echo "lock_changed=${lock_changed}" >>"${GITHUB_OUTPUT}"
          echo "build_enabled=${build_enabled}" >>"${GITHUB_OUTPUT}"

  sync-dev-lock:
    if: github.ref == 'refs/heads/dev' && needs.resolve-cli.outputs.lock_changed == 'true'
    name: Sync stable Saola CLI lock on dev
    needs: resolve-cli
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - name: Commit the resolved lock and re-dispatch Docker
        env:
          GH_TOKEN: ${{ github.token }}
          CLI_REPOSITORY: ${{ needs.resolve-cli.outputs.repository }}
          CLI_VERSION: ${{ needs.resolve-cli.outputs.version }}
          CLI_COMMIT: ${{ needs.resolve-cli.outputs.commit }}
          CLI_CHANNEL: ${{ needs.resolve-cli.outputs.channel }}
          CLI_SOURCE_DATE_EPOCH: ${{ needs.resolve-cli.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          git fetch origin dev
          git checkout -B dev origin/dev

          candidate_lock="${RUNNER_TEMP}/saola-cli-stable.lock"
          printf '%s\n' \
            "repository=${CLI_REPOSITORY}" \
            "version=${CLI_VERSION}" \
            "commit=${CLI_COMMIT}" \
            "channel=${CLI_CHANNEL}" \
            "source_date_epoch=${CLI_SOURCE_DATE_EPOCH}" \
            >"${candidate_lock}"
          hack/saola-cli-lock.sh validate "${candidate_lock}"

          mkdir -p build
          cp "${candidate_lock}" build/saola-cli-stable.lock
          git add build/saola-cli-stable.lock
          if git diff --cached --quiet; then
            echo 'origin/dev already contains the resolved stable lock; no synchronization is required.'
            exit 0
          fi
          changed_files="$(git diff --cached --name-only)"
          [[ "${changed_files}" == build/saola-cli-stable.lock ]] || {
            echo "dev lock synchronization attempted unexpected changes: ${changed_files}" >&2
            exit 1
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -c core.hooksPath=/dev/null commit --no-gpg-sign \
            -m "build: pin bundled saola CLI ${CLI_VERSION}"
          git push origin HEAD:dev
          gh workflow run docker.yml --ref dev

  publish:
    if: github.event_name != 'pull_request' && needs.resolve-cli.outputs.build_enabled == 'true'
    name: Build and push
    needs: [manager-metadata, resolve-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Check out resolved Saola CLI source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ needs.resolve-cli.outputs.repository }}
          ref: ${{ needs.resolve-cli.outputs.commit }}
          path: .saola-cli-source
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.version=${{ needs.manager-metadata.outputs.version }}
            org.opencontainers.image.revision=${{ needs.manager-metadata.outputs.git_commit }}
            org.opencontainers.image.created=${{ needs.manager-metadata.outputs.build_date }}
            org.opensaola.saola-cli.repository=${{ needs.resolve-cli.outputs.repository }}
            org.opensaola.saola-cli.version=${{ needs.resolve-cli.outputs.version }}
            org.opensaola.saola-cli.revision=${{ needs.resolve-cli.outputs.commit }}
            org.opensaola.saola-cli.channel=${{ needs.resolve-cli.outputs.channel }}
      - name: Build verification image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          build-contexts: |
            saola-cli=./.saola-cli-source
          build-args: |
            VERSION=${{ needs.manager-metadata.outputs.version }}
            GIT_COMMIT=${{ needs.manager-metadata.outputs.git_commit }}
            BUILD_DATE=${{ needs.manager-metadata.outputs.build_date }}
            SAOLA_CLI_VERSION=${{ needs.resolve-cli.outputs.version }}
            SAOLA_CLI_COMMIT=${{ needs.resolve-cli.outputs.commit }}
            SAOLA_CLI_SOURCE_DATE_EPOCH=${{ needs.resolve-cli.outputs.source_date_epoch }}
          platforms: linux/amd64
          load: true
          push: false
          tags: opensaola-manager-verify:${{ github.run_id }}-${{ github.run_attempt }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
      - name: Verify built manager image
        env:
          IMAGE: opensaola-manager-verify:${{ github.run_id }}-${{ github.run_attempt }}
          VERSION: ${{ needs.manager-metadata.outputs.version }}
          GIT_COMMIT: ${{ needs.manager-metadata.outputs.git_commit }}
          BUILD_DATE: ${{ needs.manager-metadata.outputs.build_date }}
        run: |
          set -euo pipefail

          expected="$(printf 'Version: %s\nGit Commit: %s\nBuild Date: %s' "${VERSION}" "${GIT_COMMIT}" "${BUILD_DATE}")"
          actual="$(docker run --rm "${IMAGE}" --version)"
          [[ "${actual}" == "${expected}" ]] || {
            printf 'manager image identity mismatch\nexpected:\n%s\nactual:\n%s\n' "${expected}" "${actual}" >&2
            exit 1
          }

          verify_label() {
            local key="$1"
            local expected_value="$2"
            local actual_value
            actual_value="$(docker image inspect --format "{{ index .Config.Labels \"${key}\" }}" "${IMAGE}")"
            [[ "${actual_value}" == "${expected_value}" ]] || {
              echo "image label ${key} is ${actual_value}, expected ${expected_value}" >&2
              exit 1
            }
          }

          verify_label org.opencontainers.image.version "${VERSION}"
          verify_label org.opencontainers.image.revision "${GIT_COMMIT}"
          verify_label org.opencontainers.image.created "${BUILD_DATE}"
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          build-contexts: |
            saola-cli=./.saola-cli-source
          build-args: |
            VERSION=${{ needs.manager-metadata.outputs.version }}
            GIT_COMMIT=${{ needs.manager-metadata.outputs.git_commit }}
            BUILD_DATE=${{ needs.manager-metadata.outputs.build_date }}
            SAOLA_CLI_VERSION=${{ needs.resolve-cli.outputs.version }}
            SAOLA_CLI_COMMIT=${{ needs.resolve-cli.outputs.commit }}
            SAOLA_CLI_SOURCE_DATE_EPOCH=${{ needs.resolve-cli.outputs.source_date_epoch }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
