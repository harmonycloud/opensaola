name: Docker

on:
  push:
    tags: ['v*']
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'chart/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'chart/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Cancel superseded runs for the same branch/PR, but never cancel a release
# tag build — those must always complete.
# 同一分支 / PR 的老任务被新 push 自动取消，但 tag 触发的 release 构建例外。
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  docker:
    name: Build and Push
    # Skip forked-PR builds: they can't write to GHCR and would just fail noisily.
    # 跳过 fork PR（拿不到 packages:write 权限，构建必失败）。
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
