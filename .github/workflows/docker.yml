name: Docker

on:
  push:
    tags: ['v*']
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [master, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'chart/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Cancel superseded runs for the same branch/PR, but never cancel a release
# tag build — those must always complete.
# 同一分支 / PR 的老任务被新 push 自动取消，但 tag 触发的 release 构建例外。
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  docker:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Export locked Saola CLI metadata
        id: cli
        run: |
          set -euo pipefail
          hack/saola-cli-lock.sh validate build/saola-cli.lock
          for key in repository version commit channel source_date_epoch; do
            value="$(hack/saola-cli-lock.sh get build/saola-cli.lock "${key}")"
            echo "${key}=${value}" >>"${GITHUB_OUTPUT}"
          done
      - name: Check out locked Saola CLI source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: harmonycloud/saola-cli
          ref: ${{ steps.cli.outputs.commit }}
          path: .saola-cli-source
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "Release tags must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          }
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && github.ref_type == 'tag' }}
          labels: |
            org.opensaola.saola-cli.repository=${{ steps.cli.outputs.repository }}
            org.opensaola.saola-cli.version=${{ steps.cli.outputs.version }}
            org.opensaola.saola-cli.revision=${{ steps.cli.outputs.commit }}
            org.opensaola.saola-cli.channel=${{ steps.cli.outputs.channel }}
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          build-contexts: |
            saola-cli=./.saola-cli-source
          build-args: |
            SAOLA_CLI_VERSION=${{ steps.cli.outputs.version }}
            SAOLA_CLI_COMMIT=${{ steps.cli.outputs.commit }}
            SAOLA_CLI_SOURCE_DATE_EPOCH=${{ steps.cli.outputs.source_date_epoch }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
