name: Helm Chart Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Package and Push OCI Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Require the promoted stable Saola CLI for release tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          lock_path='build/saola-cli-stable.lock'
          [[ -f "${lock_path}" ]] || {
            echo 'release chart publishing requires a promoted stable Saola CLI lock' >&2
            exit 1
          }
          hack/saola-cli-lock.sh validate "${lock_path}"
          [[ "$(hack/saola-cli-lock.sh get "${lock_path}" channel)" = stable ]] || {
            echo 'release chart publishing requires channel=stable' >&2
            exit 1
          }
      - uses: azure/setup-helm@v4
      - name: Check chart
        run: make helm-lint helm-template verify-chart-crds
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "Release tags must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          }
      - name: Package chart
        run: |
          mkdir -p dist/charts
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME#v}"
            helm package chart/opensaola \
              --destination dist/charts \
              --version "$tag" \
              --app-version "${GITHUB_REF_NAME}"
          else
            helm package chart/opensaola --destination dist/charts
          fi
      - name: Resolve OCI registry
        id: oci
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "registry=ghcr.io/${owner}/charts" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Push chart
        run: |
          chart="$(ls dist/charts/opensaola-*.tgz | head -n 1)"
          helm push "$chart" "oci://${{ steps.oci.outputs.registry }}"
