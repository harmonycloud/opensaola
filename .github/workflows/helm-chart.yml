name: Helm Chart Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Package and Push OCI Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Verify release tag matches chart version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          chart_version="$(helm show chart chart/opensaola | awk -F': ' '/^version:/ {print $2}')"
          app_version="$(helm show chart chart/opensaola | awk -F': ' '/^appVersion:/ {print $2}')"
          test "$chart_version" = "$tag"
          test "$app_version" = "v$tag"
      - name: Check chart
        run: make helm-check
      - name: Resolve OCI registry
        id: oci
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "registry=ghcr.io/${owner}/charts" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Push chart
        run: |
          chart="$(ls dist/charts/opensaola-*.tgz | head -n 1)"
          helm push "$chart" "oci://${{ steps.oci.outputs.registry }}"
