apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensaola.fullname" . }}
  labels:
    app: {{ include "opensaola.fullname" . }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "opensaola.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "opensaola.fullname" . }}
    spec:
      serviceAccountName: {{ include "opensaola.fullname" . }}
      containers:
        - name: {{ include "opensaola.fullname" . }}
          image: "{{ if .Values.image.registry }}{{ .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: opensaola-config
              mountPath: /pkg/config/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: TZ
              value: Asia/Shanghai
      volumes:
        - configMap:
            defaultMode: 420
            items:
              - key: config.yaml
                path: config.yaml
            name: {{ include "opensaola.fullname" . }}
            optional: false
          name: opensaola-config
