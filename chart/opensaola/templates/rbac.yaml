###############################################################################
# ClusterRole: cluster-wide resources the operator must reconcile.
# ClusterRole：控制器需要协调的集群级资源。
# NOTE: Package templates can require wildcard cluster access below.
# 注意：包模板可能需要下面的通配符集群访问权限。
# Package catalog Secret metadata updates rely on the namespace-scoped Role later.
# 包目录 Secret 的元数据更新依赖后续命名空间级 Role。
# This allows install/uninstall state to be persisted in spec.config.dataNamespace.
# 用于将安装/卸载状态持久化到 spec.config.dataNamespace。
###############################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opensaola.fullname" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments/finalizers
  verbs:
  - update
- apiGroups:
  - apps
  resources:
  - deployments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines
  - middlewareactions
  - middlewarebaselines
  - middlewareconfigurations
  - middlewareoperatorbaselines
  - middlewareoperators
  - middlewarepackages
  - middlewares
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines/finalizers
  - middlewareactions/finalizers
  - middlewarebaselines/finalizers
  - middlewareconfigurations/finalizers
  - middlewareoperatorbaselines/finalizers
  - middlewareoperators/finalizers
  - middlewarepackages/finalizers
  - middlewares/finalizers
  verbs:
  - update
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines/status
  - middlewareactions/status
  - middlewarebaselines/status
  - middlewareconfigurations/status
  - middlewareoperatorbaselines/status
  - middlewareoperators/status
  - middlewarepackages/status
  - middlewares/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - clusterroles
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{/*
MiddlewareConfiguration package templates can render arbitrary Kubernetes resources and CRD instances.
MiddlewareConfiguration 包模板可以渲染任意 Kubernetes 资源和 CRD 实例。
Keep this in sync with internal/controller/rbac_aggregated.go and config/rbac/role.yaml.
请与 internal/controller/rbac_aggregated.go 以及 config/rbac/role.yaml 保持同步。
*/}}
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opensaola.fullname" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opensaola.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "opensaola.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
---
###############################################################################
# Role (Release namespace): leader election lease.
# Role（发布实例命名空间）：主节点选举 Lease。
# controller-runtime uses coordination.k8s.io/Lease for leader election.
# controller-runtime 使用 coordination.k8s.io/Lease 进行主节点选举。
# The operator crashes at startup without these verbs.
# 如果缺少这些动词权限，控制器会在启动时崩溃。
# See cmd/main.go manager options (LeaderElection + ReleaseOnCancel).
# 参见 cmd/main.go 中的管理器选项（LeaderElection + ReleaseOnCancel）。
###############################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "leader-election") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "leader-election") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opensaola.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "leader-election") }}
  apiGroup: rbac.authorization.k8s.io
---
###############################################################################
# Role (data namespace): MiddlewarePackage Secret reconciliation.
# Role（数据命名空间）：MiddlewarePackage Secret 协调。
# Operator only reads and manages Secrets in .Values.config.dataNamespace.
# 控制器只会在 .Values.config.dataNamespace 中读取和管理 Secret。
# It never manages Secrets cluster-wide.
# 不会进行集群级 Secret 管理。
# If dataNamespace != Release.Namespace and config.createDataNamespace=false,
# 如果 dataNamespace != Release.Namespace，且 config.createDataNamespace=false，
# that namespace must already exist before helm install.
# 则该命名空间必须在 Helm 安装前已存在。
###############################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "packages") }}
  namespace: {{ include "opensaola.dataNamespace" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - ""
  resources:
  - secrets/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - secrets/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "packages") }}
  namespace: {{ include "opensaola.dataNamespace" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opensaola.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "packages") }}
  apiGroup: rbac.authorization.k8s.io
