###############################################################################
# ClusterRole: cluster-wide resources the operator must reconcile.
# NOTE: Package templates can require wildcard cluster access below. Package
# catalog Secret metadata updates rely on the namespace-scoped Role later so
# install/uninstall state can be persisted in spec.config.dataNamespace.
###############################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opensaola.fullname" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments/finalizers
  verbs:
  - update
- apiGroups:
  - apps
  resources:
  - deployments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines
  - middlewareactions
  - middlewarebaselines
  - middlewareconfigurations
  - middlewareoperatorbaselines
  - middlewareoperators
  - middlewarepackages
  - middlewares
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines/finalizers
  - middlewareactions/finalizers
  - middlewarebaselines/finalizers
  - middlewareconfigurations/finalizers
  - middlewareoperatorbaselines/finalizers
  - middlewareoperators/finalizers
  - middlewarepackages/finalizers
  - middlewares/finalizers
  verbs:
  - update
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines/status
  - middlewareactions/status
  - middlewarebaselines/status
  - middlewareconfigurations/status
  - middlewareoperatorbaselines/status
  - middlewareoperators/status
  - middlewarepackages/status
  - middlewares/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterrolebindings
  - clusterroles
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{/*
MiddlewareConfiguration package templates can render arbitrary Kubernetes
resources and CRD instances. Keep this in sync with
internal/controller/rbac_aggregated.go and config/rbac/role.yaml.
*/}}
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opensaola.fullname" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opensaola.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "opensaola.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
---
###############################################################################
# Role (Release namespace): leader election lease.
# controller-runtime uses coordination.k8s.io/Lease for leader election; the
# operator crashes at startup without these verbs. See cmd/main.go manager
# options (LeaderElection + ReleaseOnCancel).
###############################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "leader-election") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "leader-election") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opensaola.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "leader-election") }}
  apiGroup: rbac.authorization.k8s.io
---
###############################################################################
# Role (data namespace): MiddlewarePackage Secret reconciliation.
# Operator only reads and manages Secrets in .Values.config.dataNamespace,
# never cluster-wide. If dataNamespace != Release.Namespace the operator is
# installed in and config.createDataNamespace=false, that namespace must
# already exist before helm install.
###############################################################################
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "packages") }}
  namespace: {{ include "opensaola.dataNamespace" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - ""
  resources:
  - secrets/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - secrets/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "packages") }}
  namespace: {{ include "opensaola.dataNamespace" . }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opensaola.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "packages") }}
  apiGroup: rbac.authorization.k8s.io
