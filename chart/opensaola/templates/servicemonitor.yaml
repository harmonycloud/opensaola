{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opensaola.suffixedName" (dict "root" . "suffix" "metrics") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "opensaola.selectorLabels" . | nindent 4 }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "opensaola.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensaola.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "opensaola.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      scheme: http
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
{{- end }}
