# OpenSaola Helm Chart Values

# -- Container image configuration
image:
  # -- Image registry
  registry: "ghcr.io"
  # -- Image repository
  repository: harmonycloud/opensaola
  # -- Image tag. Empty defaults to Chart appVersion (`dev` on the dev branch; release workflows package `v*` tags with the matching appVersion).
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Number of operator replicas
replicas: 1

# -- CRD installation via kubectl job
kubectl:
  # -- Whether to install/upgrade CRDs via pre-install hook
  installCRDs: true
  # -- kubectl image for CRD install job
  image:
    # -- Kubectl image registry. Kept separate from image.registry so operator image overrides do not affect the hook job.
    registry: "registry.k8s.io"
    repository: kubectl
    tag: "v1.30.14"
    pullPolicy: IfNotPresent
  # -- Optional labels for the CRD install Job pod
  labels: {}
  # -- Optional annotations for the CRD install Job pod
  annotations: {}
  # -- Pod resource requirements for the CRD install Job
  resources: {}
  # -- Node selector for the CRD install Job
  nodeSelector: {}
  # -- Tolerations for the CRD install Job
  tolerations: []
  # -- Affinity rules for the CRD install Job
  affinity: {}

# -- Operator configuration
config:
  # -- Namespace where middleware package Secrets are stored. Empty defaults to the Helm release namespace.
  dataNamespace: ""
  # -- Create config.dataNamespace when it is set and differs from the Helm release namespace.
  createDataNamespace: false
  # -- Log level (0=debug, 1=info, 2=warn, 3=error)
  logLevel: 0
  # -- Log format: "console" (human-readable) or "json" (structured)
  logFormat: "console"
  # -- Log file path (empty disables file logging)
  logFilePath: ""
  # -- Cache cleanup interval in seconds
  cacheCleanupInterval: 600
  # -- Labels configuration
  labels:
    component: "middleware.cn/component"
  # -- Annotations configuration
  annotations:
    component: "middleware.cn/component"
  # -- pprof profiling server (for development/debugging only, NOT for production)
  pprof:
    enabled: false
    port: "6060"

# -- Service account configuration for the operator
serviceAccount:
  # -- Create a service account for the operator
  create: true
  # -- Service account name. Empty defaults to the chart fullname.
  name: ""
  # -- Extra annotations for the service account
  annotations: {}

# -- Pod resource requirements
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Extra labels for the operator pod
podLabels: {}

# -- Extra annotations for the operator pod
podAnnotations: {}

# -- PodDisruptionBudget (only effective when replicas > 1)
pdb:
  # -- Enable PDB creation
  enabled: true
  # -- Minimum available pods during disruption
  minAvailable: 1

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 60

# -- Time zone passed to the operator container
timezone: "UTC"
