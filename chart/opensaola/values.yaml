# OpenSaola Helm Chart Values
# OpenSaola Helm Chart 配置项

# -- Container image configuration
# -- 容器镜像配置
image:
  # -- Image registry
  # -- 镜像仓库地址
  registry: "ghcr.io"
  # -- Image repository
  # -- 镜像仓库
  repository: harmonycloud/opensaola
  # -- Image tag. Empty defaults to Chart appVersion; release workflows package `v*` tags with the matching appVersion.
  # -- 镜像标签。为空时默认使用 Helm 包 appVersion；发行工作流会用匹配的 appVersion 打包 `v*` 标签。
  tag: ""
  # -- Image pull policy. Keep immutable release/SHA tags reproducible; override to Always only for floating tags.
  # -- 镜像拉取策略。正式版本和 SHA 镜像保持可复现；仅使用浮动标签时覆盖为 Always。
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
# -- 私有镜像仓库使用的镜像拉取凭据
imagePullSecrets: []

# -- Number of operator replicas
# -- 控制器副本数
replicas: 2

# -- CRD installation via kubectl job
# -- 通过 kubectl Job 安装 CRD
kubectl:
  # -- Whether to install/upgrade CRDs via pre-install hook
  # -- 是否通过预安装钩子安装或升级 CRD
  installCRDs: true
  # -- kubectl image for CRD install job
  # -- CRD 安装 Job 使用的 kubectl 镜像
  image:
    # -- Kubectl image registry. Defaults to GHCR for environments that cannot access registry.k8s.io; kept separate from image.registry so operator image overrides do not affect the hook job.
    # -- kubectl 镜像仓库地址。默认使用 GHCR，适配无法访问 registry.k8s.io 的环境；与 image.registry 分开配置，避免控制器镜像覆盖影响钩子 Job。
    registry: "ghcr.io"
    repository: harmonycloud/kubectl
    tag: "v1.30.14"
    pullPolicy: IfNotPresent
  # -- Optional labels for the CRD install Job pod
  # -- CRD 安装 Job Pod 的可选标签
  labels: {}
  # -- Optional annotations for the CRD install Job pod
  # -- CRD 安装 Job Pod 的可选注解
  annotations: {}
  # -- Pod resource requirements for the CRD install Job
  # -- CRD 安装 Job Pod 的资源需求
  resources: {}
  # -- Node selector for the CRD install Job
  # -- CRD 安装 Job 的节点选择器
  nodeSelector: {}
  # -- Tolerations for the CRD install Job
  # -- CRD 安装 Job 的污点容忍
  tolerations: []
  # -- Affinity rules for the CRD install Job
  # -- CRD 安装 Job 的亲和性规则
  affinity: {}

# -- Operator configuration
# -- 控制器配置
config:
  # -- Namespace where middleware package Secrets are stored. Empty defaults to the Helm release namespace.
  # -- 存放中间件包 Secret 的命名空间。为空时默认使用 Helm 发布实例命名空间。
  dataNamespace: ""
  # -- Create config.dataNamespace when it is set and differs from the Helm release namespace.
  # -- 当 config.dataNamespace 已设置且不同于 Helm 发布实例命名空间时，是否创建该命名空间。
  createDataNamespace: false
  # -- Log level (0=debug, 1=info, 2=warn, 3=error)
  # -- 日志级别（0=debug，1=info，2=warn，3=error）
  logLevel: 1
  # -- Log format: "console" (human-readable) or "json" (structured)
  # -- 日志格式："console"（便于阅读）或 "json"（结构化）
  logFormat: "console"
  # -- Log file path. Empty disables file logging.
  # -- 日志文件路径。为空时禁用文件日志。
  logFilePath: "logs/opensaola.log"
  # -- Cache cleanup interval in seconds
  # -- 缓存清理间隔，单位为秒
  cacheCleanupInterval: 600
  # -- Labels configuration
  # -- 标签配置
  labels:
    component: "middleware.cn/component"
  # -- Annotations configuration
  # -- 注解配置
  annotations:
    component: "middleware.cn/component"
  # -- pprof profiling server (for development/debugging only, NOT for production)
  # -- pprof 性能分析服务（仅用于开发和调试，不建议在生产环境启用）
  pprof:
    enabled: false
    port: "6060"

# -- Service account configuration for the operator
# -- 控制器使用的 ServiceAccount 配置
serviceAccount:
  # -- Create a service account for the operator
  # -- 是否为控制器创建 ServiceAccount
  create: true
  # -- Service account name. Empty defaults to the chart fullname.
  # -- ServiceAccount 名称。为空时默认使用 Helm 包完整名称。
  name: ""
  # -- Extra annotations for the service account
  # -- ServiceAccount 的额外注解
  annotations: {}

# -- Pod resource requirements
# -- Pod 资源需求
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Node selector for pod scheduling
# -- Pod 调度使用的节点选择器
nodeSelector: {}

# -- Tolerations for pod scheduling
# -- Pod 调度使用的污点容忍
tolerations: []

# -- Affinity rules for pod scheduling
# -- Pod 调度使用的亲和性规则
affinity: {}

# -- Metrics endpoint configuration (controller-runtime built-in metrics over HTTP)
# -- 指标端点配置（通过 HTTP 暴露 controller-runtime 内置指标）
metrics:
  # -- Enable the metrics HTTP endpoint and container port
  # -- 是否启用指标 HTTP 端点和容器端口
  enabled: true
  # -- Port the metrics endpoint binds to
  # -- 指标端点监听的端口
  port: 8081
  # -- ServiceMonitor for Prometheus auto-discovery (requires prometheus-operator)
  # -- 供 Prometheus 自动发现的 ServiceMonitor（需要 prometheus-operator）
  serviceMonitor:
    # -- Enable ServiceMonitor creation
    # -- 是否创建 ServiceMonitor
    enabled: false
    # -- Scrape interval
    # -- 抓取间隔
    interval: 30s
    # -- Extra labels for the ServiceMonitor (e.g. to match the Prometheus selector)
    # -- ServiceMonitor 的额外标签（例如用于匹配 Prometheus 的选择器）
    labels: {}

# -- Extra labels for the operator pod
# -- 控制器 Pod 的额外标签
podLabels: {}

# -- Extra annotations for the operator pod
# -- 控制器 Pod 的额外注解
podAnnotations: {}

# -- PodDisruptionBudget (only effective when replicas > 1)
# -- PodDisruptionBudget（仅当 replicas > 1 时生效）
pdb:
  # -- Enable PDB creation
  # -- 是否创建 PDB
  enabled: true
  # -- Minimum available pods during disruption
  # -- 扰动期间最少可用 Pod 数
  minAvailable: 1

# -- Termination grace period in seconds
# -- 终止宽限时间，单位为秒
terminationGracePeriodSeconds: 60

# -- Time zone passed to the operator container
# -- 传入控制器容器的时区
timezone: "Asia/Shanghai"
