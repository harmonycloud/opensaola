# This rule is not used by the project opensaola itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to middleware.cn resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: opensaola
    app.kubernetes.io/managed-by: kustomize
  name: middlewareconfiguration-viewer-role
rules:
- apiGroups:
  - middleware.cn
  resources:
  - middlewareconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - middleware.cn
  resources:
  - middlewareconfigurations/status
  verbs:
  - get
