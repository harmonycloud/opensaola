  - middlewarebaselines/finalizers
  - middlewareconfigurations/finalizers
  - middlewareoperatorbaselines/finalizers
  - middlewareoperators/finalizers
  - middlewarepackages/finalizers
  - middlewares/finalizers
  verbs:
  - update
- apiGroups:
  - middleware.cn
  resources:
  - middlewareactionbaselines/status
  - middlewareactions/status
  - middlewarebaselines/status
  - middlewareconfigurations/status
  - middlewareoperatorbaselines/status
  - middlewareoperators/status
  - middlewarepackages/status
  - middlewares/status
  verbs:
  - get
  - patch
  - update
