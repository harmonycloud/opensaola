log:
  level: 0 # 0.debug 1.info 2.warn 3.error 4.fatal 5.panic 7.disable
  format: "console" # "console" for human-readable, "json" for structured JSON output
  file_path: logs/zeusopt.log # log file path
  count: 10 # max historical backups
  size: 50 # max file size in MB
kube:
  config: "remoteConfig"
labels:
  component: "middleware.cn/component"
annotations:
  component: "middleware.cn/component"
  crsync: "middleware.cn/crsync"
data_namespace: "middleware-operator"
cache_cleanup_interval: 1800 # cache cleanup interval in seconds
pprof:
  enabled: false
  port: "6060"